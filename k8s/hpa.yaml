apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: axon-backend-hpa
  namespace: axon
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: axon-backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60