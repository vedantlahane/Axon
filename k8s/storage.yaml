apiVersion: v1
kind: PersistentVolume
metadata:
  name: axon-uploads-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /data/axon-uploads
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - axon-dev-worker
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: axon-uploads-pvc
  namespace: axon
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 10Gi