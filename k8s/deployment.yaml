apiVersion: apps/v1
kind: Deployment
metadata:
  name: axon-backend
  namespace: axon
  labels:
    app: axon
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: axon
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: axon
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/api/health/"
    spec:
      containers:
        - name: axon-backend
          image: vedantlahane/axon-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: axon-config
            - secretRef:
                name: axon-secrets
          volumeMounts:
            - name: uploads
              mountPath: /app/backend/uploads
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: axon-uploads-pvc
      restartPolicy: Always