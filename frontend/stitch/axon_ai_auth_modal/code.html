<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#c4c7c9",
                        "tertiary": "#ffffff",
                        "surface-bright": "#31394d",
                        "on-tertiary-fixed": "#0d1c2f",
                        "on-secondary-container": "#a7b6cc",
                        "on-primary-container": "#626567",
                        "on-primary": "#2d3133",
                        "error": "#ffb4ab",
                        "on-secondary-fixed": "#0d1c2d",
                        "outline": "#8e9193",
                        "background": "#0b1326",
                        "on-tertiary-container": "#57657b",
                        "on-error": "#690005",
                        "on-tertiary": "#233144",
                        "on-primary-fixed": "#191c1e",
                        "tertiary-fixed-dim": "#b9c7e0",
                        "on-surface": "#dae2fd",
                        "secondary-fixed": "#d4e4fa",
                        "primary-container": "#e0e3e5",
                        "on-primary-fixed-variant": "#444749",
                        "surface-container-lowest": "#060e20",
                        "primary-fixed-dim": "#c4c7c9",
                        "outline-variant": "#444749",
                        "tertiary-fixed": "#d5e3fd",
                        "on-secondary": "#233143",
                        "inverse-on-surface": "#283044",
                        "surface-variant": "#2d3449",
                        "surface-container-high": "#222a3d",
                        "primary": "#ffffff",
                        "on-error-container": "#ffdad6",
                        "error-container": "#93000a",
                        "secondary-fixed-dim": "#b9c8de",
                        "on-secondary-fixed-variant": "#39485a",
                        "surface-dim": "#0b1326",
                        "surface-tint": "#c4c7c9",
                        "inverse-primary": "#5c5f61",
                        "surface": "#0b1326",
                        "surface-container-highest": "#2d3449",
                        "on-tertiary-fixed-variant": "#3a485c",
                        "on-background": "#dae2fd",
                        "tertiary-container": "#d5e3fd",
                        "secondary": "#b9c8de",
                        "surface-container-low": "#131b2e",
                        "surface-container": "#171f33",
                        "secondary-container": "#39485a",
                        "primary-fixed": "#e0e3e5",
                        "inverse-surface": "#dae2fd"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .glass-modal {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px) saturate(180%);
            box-shadow: inset 0 0 0 0.5px rgba(255, 255, 255, 0.15);
        }
        .ambient-orb {
            position: absolute;
            filter: blur(100px);
            opacity: 0.15;
            z-index: 0;
            border-radius: 9999px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body overflow-hidden">
<!-- AMBIENT ORBS -->
<div class="ambient-orb bg-secondary w-[500px] h-[500px] -top-40 -left-40"></div>
<div class="ambient-orb bg-surface-bright w-[400px] h-[400px] bottom-0 right-0"></div>
<!-- LOCKED TOP BAR (BACKGROUND) -->
<header class="fixed top-0 w-full z-10 flex justify-between items-center px-6 py-4 opacity-40 blur-md grayscale">
<div class="text-lg font-medium text-white lowercase font-headline tracking-tight">axon ai</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-400">search</span>
<div class="w-8 h-8 rounded-full bg-surface-container"></div>
</div>
</header>
<!-- BACKGROUND CONTENT (EMPTY STATE) -->
<main class="flex flex-col items-center justify-center min-h-screen p-6 opacity-40 blur-md grayscale">
<div class="w-24 h-24 mb-6 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-on-surface-variant">auto_awesome</span>
</div>
<h1 class="text-2xl font-headline font-semibold mb-2">Welcome to Axon</h1>
<p class="text-on-surface-variant max-w-sm text-center">Start a new conversation with our advanced neural models to explore concepts, write code, or create content.</p>
</main>
<!-- LOCKED INPUT BAR (BACKGROUND) -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 w-full max-w-2xl px-6 opacity-40 blur-md grayscale z-10">
<div class="bg-surface-container-low h-14 rounded-full flex items-center px-6 border border-outline-variant/15">
<span class="text-slate-500">Type a message...</span>
</div>
</div>
<!-- AUTH OVERLAY -->
<div class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
<div class="glass-modal w-full max-w-[420px] rounded-2xl p-8 flex flex-col gap-8 relative overflow-hidden">
<!-- Modal Header / Tabs -->
<div class="flex flex-col gap-6">
<div class="flex justify-center">
<div class="text-2xl font-bold font-headline tracking-tighter text-white">axon ai</div>
</div>
<div class="flex p-1 bg-surface-container-lowest/50 rounded-xl">
<button class="flex-1 py-2 text-sm font-medium text-white bg-white/10 rounded-lg shadow-sm">Sign In</button>
<button class="flex-1 py-2 text-sm font-medium text-on-surface-variant hover:text-white transition-colors">Sign Up</button>
</div>
</div>
<!-- Sign In Form -->
<form class="flex flex-col gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-[10px] uppercase tracking-widest text-on-surface-variant font-medium px-1">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none focus:ring-1 focus:ring-primary/20 rounded-xl py-3 px-4 text-sm text-white placeholder:text-slate-600 transition-all" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-end px-1">
<label class="text-[10px] uppercase tracking-widest text-on-surface-variant font-medium">Password</label>
<a class="text-[10px] font-semibold text-violet-400 hover:text-violet-300 transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none focus:ring-1 focus:ring-primary/20 rounded-xl py-3 px-4 text-sm text-white placeholder:text-slate-600 transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-semibold py-3.5 rounded-xl mt-2 hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="relative flex items-center">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 text-[10px] uppercase tracking-widest text-on-surface-variant/60 font-medium">or continue with</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl bg-white/5 border border-outline-variant/10 hover:bg-white/10 transition-all">
<img alt="Google" class="w-5 h-5 opacity-80" data-alt="Official Google G-logo with primary brand colors on transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqG0XEpeJKt5I9X7NPeNMlmSzvK_dYegSaNQ-Uwvvv4h6XBvyZ0KQHkoLFRS1Oi2FGuAFbKKQHLsuQ7NjzHCWRo3A0CzYA0l5NKY5_ETi1bCdn3VsxxIx3o3Cl34-Zcp6Dr63o2NvbKmKNSamRGTwE1PqSnbuYOpT8-o-mVRoUCxFBfRvMp3eFbKqnLynTjWtdJWaKC6_onvQGc8zVIWDeB2uoydSWdPN9QE9ASV91FjyAUwebSirQoJWs2JsPp-XlJhQ-rpRiwZOy"/>
<span class="text-sm font-medium text-white">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl bg-white/5 border border-outline-variant/10 hover:bg-white/10 transition-all">
<span class="material-symbols-outlined text-white text-xl">terminal</span>
<span class="text-sm font-medium text-white">GitHub</span>
</button>
</div>
<!-- Footer -->
<p class="text-center text-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-white font-semibold hover:underline" href="#">Sign up</a>
</p>
<!-- Subtle Light Leak Effect -->
<div class="absolute -bottom-24 -left-24 w-48 h-48 bg-primary/5 blur-[80px] rounded-full"></div>
</div>
</div>
</body></html>
