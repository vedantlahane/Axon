<style>
        .liquid-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px) saturate(180%);
            box-shadow: inset 0 0 0 0.5px rgba(255, 255, 255, 0.15);
        }
        .ai-pulse-glow {
            background: radial-gradient(circle, rgba(185, 200, 222, 0.12) 0%, rgba(11, 19, 38, 0) 70%);
        }
        .light-leak-top {
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.2), 0 -10px 20px -10px rgba(255, 255, 255, 0.1);
        }
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.4;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen selection:bg-primary/20">
<!-- Ambient Orbs -->
<div class="ambient-orb w-[600px] h-[600px] bg-secondary/20 -top-48 -left-48"></div>
<div class="ambient-orb w-[500px] h-[500px] bg-surface-container-highest/30 bottom-0 right-0"></div>
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 w-full bg-transparent">
<div class="text-lg font-medium text-white lowercase font-inter tracking-tight">
            axon ai
        </div>
<div class="flex items-center gap-6">
<button class="text-slate-400 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
<div class="w-8 h-8 rounded-full bg-slate-700/50 flex items-center justify-center overflow-hidden">
<img alt="User avatar" class="w-full h-full object-cover" data-alt="close up profile shot of a minimalist geometric avatar with a soft gray and blue color palette" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-oUtLiHtjBzdcsOqtUEh-aEX96-CitxR0OJMfOjAw2KD68r9FL3nOLiTIplP1VqIkMdUszmwCwdbcaY5GQYAYsCQt8WUqnUV5P3dHYTOLLbf0eTL9sBvrksXooK5Ze-_F1cnVPN7jMt-Okr1zuIBmmO77TIyZbCcDgRxZj1OxPsSsNjdQlYjO9H7DSZ6oEP_0yBPBEd5bjtplNDxm6D6Cbce3Ub4Sm-YjRiCDbRc-LMWes-wjTQKHXG47-ZqAWhiPwoynaneqJbMJ"/>
</div>
</div>
</nav>
<main class="flex flex-col items-center justify-center min-h-screen px-6 pt-20 pb-48 max-w-5xl mx-auto">
<!-- Hero Section -->
<div class="relative mb-16 flex flex-col items-center">
<!-- AI Pulse Radial Gradient -->
<div class="ai-pulse-glow absolute -inset-24 rounded-full"></div>
<!-- Icon Glass Box -->
<div class="liquid-glass w-20 h-20 rounded-2xl flex items-center justify-center mb-10 z-10">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<!-- Tagline -->
<h1 class="text-5xl md:text-6xl font-extralight tracking-tight text-center leading-tight">
                Ask anything. <span class="text-on-primary-container">Upload anything.</span>
</h1>
</div>
<!-- Suggestion Pills (2x2 Grid) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl">
<button class="liquid-glass hover:bg-white/10 transition-all p-5 rounded-xl flex items-center gap-4 text-left group">
<div class="w-10 h-10 rounded-lg bg-surface-container-high flex items-center justify-center text-secondary group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="terminal">terminal</span>
</div>
<span class="text-on-surface-variant font-medium">Optimize a SQL query</span>
</button>
<button class="liquid-glass hover:bg-white/10 transition-all p-5 rounded-xl flex items-center gap-4 text-left group">
<div class="w-10 h-10 rounded-lg bg-surface-container-high flex items-center justify-center text-secondary group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="description">description</span>
</div>
<span class="text-on-surface-variant font-medium">Analyze a document</span>
</button>
<button class="liquid-glass hover:bg-white/10 transition-all p-5 rounded-xl flex items-center gap-4 text-left group">
<div class="w-10 h-10 rounded-lg bg-surface-container-high flex items-center justify-center text-secondary group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="database">database</span>
</div>
<span class="text-on-surface-variant font-medium">Explore database schema</span>
</button>
<button class="liquid-glass hover:bg-white/10 transition-all p-5 rounded-xl flex items-center gap-4 text-left group">
<div class="w-10 h-10 rounded-lg bg-surface-container-high flex items-center justify-center text-secondary group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="code">code</span>
</div>
<span class="text-on-surface-variant font-medium">Write a Python function</span>
</button>
</div>
<!-- Locked Input Bar Area -->
<div class="fixed bottom-12 w-full max-w-3xl px-6 flex flex-col gap-4">
<div class="liquid-glass rounded-2xl p-2 light-leak-top">
<div class="flex items-center gap-4 px-4 py-3">
<input class="bg-transparent border-none focus:ring-0 w-full text-lg placeholder:text-on-primary-container text-white" placeholder="Send a message..." type="text"/>
<button class="bg-primary text-on-primary w-10 h-10 rounded-xl flex items-center justify-center hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined" data-icon="arrow_upward">arrow_upward</span>
</button>
</div>
</div>
<!-- Meta Row -->
<div class="flex justify-center items-center gap-6 text-[10px] tracking-[0.1em] font-medium text-slate-500 uppercase font-label px-4">
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-secondary/40"></span>
<span>Model: Gemini 2.5 Pro</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-xs" data-icon="attachment">attachment</span>
<span>0 documents</span>
</div>
<div class="flex items-center gap-2 px-2 py-0.5 border border-slate-700/50 rounded-md">
<span>⌘K for commands</span>
</div>
</div>
</div>
</main>
